<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Añadir Usuario OVI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
<main class="container mt-4">
  <h1>Añadir Nuevo Usuario</h1>

  <form action="#" th:action="@{/usuario/add}" th:object="${usuario}" method="post">
    <div class="mb-3">
      <label for="identificadorSgovi" class="form-label">Identificador SGOVID:</label>
      <input type="text" class="form-control" id="identificadorSgovi" th:field="*{identificadorSgovi}" required />
    </div>

    <div class="mb-3">
      <label for="contrasenya" class="form-label">Contraseña:</label>
      <input type="password" class="form-control" id="contrasenya" th:field="*{contrasenya}" required />
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email:</label>
      <input type="email" class="form-control" id="email" th:field="*{email}" required />
    </div>

    <div class="mb-3">
      <label for="nom" class="form-label">Nombre:</label>
      <input type="text" class="form-control" id="nom" th:field="*{nom}" required />
    </div>

    <div class="mb-3">
      <label for="cognoms" class="form-label">Apellidos:</label>
      <input type="text" class="form-control" id="cognoms" th:field="*{cognoms}" required />
    </div>

    <div class="mb-3">
      <label for="dni" class="form-label">DNI:</label>
      <input type="text" class="form-control" id="dni" th:field="*{dni}" required />
    </div>

    <div class="mb-3">
      <label for="telefon" class="form-label">Teléfono:</label>
      <input type="text" class="form-control" id="telefon" th:field="*{telefon}" />
    </div>

    <div class="mb-3">
      <label for="dataNaixement" class="form-label">Fecha de Nacimiento:</label>
      <input type="date" class="form-control" id="dataNaixement" th:field="*{dataNaixement}" />
    </div>

    <div class="mb-3">
      <label for="adreca" class="form-label">Dirección:</label>
      <textarea class="form-control" id="adreca" th:field="*{adreca}" rows="2"></textarea>
    </div>

    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="consentimentInformat" th:field="*{consentimentInformat}" checked />
      <label class="form-check-label" for="consentimentInformat">Consentimiento informado</label>
    </div>

    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="estatTecnicAcceptat" th:field="*{estatTecnicAcceptat}" />
      <label class="form-check-label" for="estatTecnicAcceptat">Estado técnico aceptado</label>
    </div>

    <h3>Tutor Legal (solo para menores)</h3>

    <div class="mb-3">
      <label for="tutorLegalNom" class="form-label">Nombre del Tutor:</label>
      <input type="text" class="form-control" id="tutorLegalNom" th:field="*{tutorLegalNom}" />
    </div>

    <div class="mb-3">
      <label for="tutorLegalContacte" class="form-label">Contacto del Tutor:</label>
      <input type="text" class="form-control" id="tutorLegalContacte" th:field="*{tutorLegalContacte}" />
    </div>

    <input type="hidden" th:field="*{dataRegistre}" />

    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="/usuario/list" class="btn btn-secondary">Cancelar</a>
  </form>
</main>
</body>
</html>
